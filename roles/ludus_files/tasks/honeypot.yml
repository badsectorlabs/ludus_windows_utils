# =============================================================================
# SUMMARY
# =============================================================================

- name: Log honeypot deployment
  ansible.builtin.debug:
    msg: |
      Honeypot files deployed:
        Categories: {{ ludus_honeypot_categories | join(', ') }}
        Locations: {{ ludus_honeypot_locations | length }}
        Include legacy files: {{ ludus_honeypot_include_legacy }}
