---
# ludus_child_domain_join - Default Variables
#
# Required variables (must be set in role_vars):
#   ludus_child_domain_fqdn  - The FQDN of the child domain to join (e.g., north.sevenkingdoms.local)
#   ludus_child_dc_ip        - The IP address of the child domain DC

# Child domain FQDN to join (e.g., "north.sevenkingdoms.local")
ludus_child_domain_fqdn: ""

# Child domain DC IP address (for DNS)
ludus_child_dc_ip: ""

# Optional overrides - defaults to Ludus defaults if not specified
# Uses CHILD domain admin credentials (NOT parent/Enterprise Admin).
# This avoids cross-domain NTLM forwarding issues when ludus_ad_anonymous_rpc
# has been applied on the child DC.
# ludus_domain_admin_user: "domainadmin@north.sevenkingdoms.local"
# ludus_domain_admin_password: "password"

# DEPRECATED — ludus_parent_domain_fqdn is no longer used.
# The role now uses child domain creds by default. Kept for backward compat
# but has no effect unless ludus_domain_admin_user is explicitly set.
ludus_parent_domain_fqdn: ""
