---
# ludus_child_domain_join — Join a machine to a child domain (idempotent)
# Reference: https://docs.ansible.com/ansible/latest/collections/microsoft/ad/membership_module.html
#
# microsoft.ad.membership is idempotent - it checks membership state and skips if joined
# Uses the PARENT domain's Enterprise Admin credentials to join machines to the child domain.

# Step 1: Configure DNS to the child domain DC
- name: Configure DNS to child domain DC
  ansible.windows.win_dns_client:
    adapter_names: "*"
    ipv4_addresses:
      - "{{ ludus_child_dc_ip }}"

# Step 2: Join the machine to the child domain (idempotent - skips if already joined)
- name: Join machine to child domain
  microsoft.ad.membership:
    dns_domain_name: "{{ ludus_child_domain_fqdn }}"
    domain_admin_user: "{{ ludus_domain_admin_user | default(defaults.ad_domain_admin + '@' + ludus_parent_domain_fqdn) }}"
    domain_admin_password: "{{ ludus_domain_admin_password | default(defaults.ad_domain_admin_password) }}"
    state: domain
    reboot: true
  register: _domain_join_result
  until: _domain_join_result is succeeded
  retries: 10
  delay: 60
